<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<!-- build: 20260611-135430 -->
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Progetti</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&display=swap"/>
<style>
:root{
  --verde:#9DBF60;--grigio:#77797a;--grigio-chiaro:#aaaaaa;
  --navy:#4A4C4D;--blue:#77797a;--blue-mid:#9DBF60;--blue-light:#D5E3B7;--blue-xlight:#EEF5E3;
  --accent:#9DBF60;--accent-light:#EEF5E3;
  --red:#C0392B;--red-light:#FDECEA;--green:#9DBF60;--green-light:#EEF5E3;
  --orange:#E67E22;--orange-light:#FEF0E3;
  --purple:#8E44AD;--purple-light:#F4EAF9;
  --yellow:#F39C12;--yellow-light:#FEF9E3;
  --g50:#F8F9F8;--g100:#F0F2EE;--g200:#E2E6DF;--g300:#C8CEC4;--g500:#77797a;--g700:#4A4C4D;--g900:#2A2C2D;
  --sh-sm:0 1px 3px rgba(74,76,77,.08),0 1px 2px rgba(74,76,77,.05);
  --sh-md:0 4px 12px rgba(74,76,77,.10);--sh-lg:0 12px 32px rgba(74,76,77,.14),0 4px 10px rgba(74,76,77,.07);
  --r:10px;--rsm:6px;--rlg:16px;
  font-family:'Raleway',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--g50);color:var(--g900);}
.hid{display:none!important;}

/* ---- TOAST ---- */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--g700);color:#fff;padding:10px 20px;border-radius:var(--r);
  font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.tok{background:var(--verde);}#toast.terr{background:var(--red);}
#toast.twarn{background:var(--orange);}

/* ---- LOGIN ---- */
#lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--g50);}
.lcard{background:#fff;border-radius:var(--rlg);padding:40px 38px;width:100%;max-width:420px;
       box-shadow:var(--sh-lg);border:1px solid var(--g200);}
.lfield{margin-bottom:16px;}
.lfield label{display:block;font-size:12px;font-weight:600;color:var(--g700);letter-spacing:.5px;margin-bottom:6px;}
.lfield input{width:100%;padding:11px 14px;border:1px solid var(--g200);border-radius:var(--rsm);
              background:#EEF5E3;font-family:'Raleway',sans-serif;font-size:14px;color:var(--g900);
              outline:none;transition:border-color .2s;}
.lfield input:focus{border-color:var(--verde);}
.lbtn{width:100%;padding:12px;background:var(--verde);color:#fff;border:none;border-radius:var(--rsm);
      font-family:'Raleway',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;}
.lbtn:hover{opacity:.88;}
.lerr{background:var(--red-light);color:var(--red);border-radius:var(--rsm);padding:10px 14px;
      font-size:13px;margin-top:14px;display:none;}

/* ---- APP SHELL ---- */
#app{display:flex;flex-direction:column;min-height:100vh;}
#topbar{background:#fff;border-bottom:1px solid var(--g200);padding:0 28px;
        position:sticky;top:0;z-index:100;box-shadow:var(--sh-sm);}
#tb-top{height:52px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g100);}
#tb-nav{height:40px;display:flex;align-items:stretch;}
#tb-right{display:flex;align-items:center;gap:12px;}
#tb-ver{font-size:10px;color:var(--grigio-chiaro);letter-spacing:.5px;}
#tb-user{font-size:13px;font-weight:600;color:var(--g700);}
#tb-role{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--blue-light);color:var(--navy);font-weight:600;letter-spacing:.3px;}
#lout{background:none;border:1px solid var(--g200);border-radius:var(--rsm);padding:5px 12px;
      font-family:'Raleway',sans-serif;font-size:12px;font-weight:600;color:var(--g500);cursor:pointer;transition:all .2s;}
#lout:hover{border-color:var(--red);color:var(--red);}
.tnb{display:flex;align-items:center;gap:6px;padding:0 16px;font-size:12.5px;font-weight:600;
     color:var(--g500);cursor:pointer;border:none;background:none;font-family:'Raleway',sans-serif;
     letter-spacing:.3px;border-bottom:2.5px solid transparent;transition:all .17s;text-transform:uppercase;}
.tnb:hover{color:var(--g700);border-bottom-color:var(--g300);}
.tnb.active{color:var(--verde);border-bottom-color:var(--verde);}
/* Admin dropdown */
.tnb-admin-wrap{position:relative;display:flex;align-items:stretch;}
.tnb-admin-wrap .tnb{border-bottom:2.5px solid transparent;}
.tnb-admin-wrap.active .tnb{color:var(--verde);border-bottom-color:var(--verde);}
.tnb-admin-menu{
  position:absolute;top:calc(100% + 1px);right:0;
  background:#fff;border:1px solid var(--g200);border-radius:var(--r);
  box-shadow:var(--sh-lg);min-width:150px;z-index:200;
  display:none;flex-direction:column;padding:6px 0;
}
.tnb-admin-menu.open{display:flex;}
.tnb-admin-item{
  padding:9px 18px;font-size:12.5px;font-weight:600;color:var(--g500);
  cursor:pointer;text-transform:uppercase;letter-spacing:.3px;transition:background .15s;
}
.tnb-admin-item:hover{background:var(--g50);color:var(--g700);}
.tnb-admin-item.active{color:var(--verde);background:var(--accent-light);}

/* ---- MAIN + DRAWER ---- */
#app-body{display:flex;flex:1;overflow:hidden;position:relative;}
#main{flex:1;padding:28px;overflow-y:auto;transition:margin-left .3s;}
#drawer{position:fixed;right:0;top:52px;height:calc(100vh - 92px);
        width:300px;background:#fff;border-left:1px solid var(--g200);box-shadow:var(--sh-md);
        z-index:90;transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column;}
#drawer.open{transform:translateX(0);}
#drawer-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:91;
               background:var(--verde);color:#fff;border:none;cursor:pointer;
               padding:10px 6px;border-radius:var(--rsm) 0 0 var(--rsm);box-shadow:var(--sh-md);
               font-family:'Raleway',sans-serif;font-weight:700;font-size:11px;transition:right .3s;
               writing-mode:vertical-rl;}
#drawer-toggle.open{right:300px;}

/* ---- DRAWER CONTENT ---- */
#drawer-head{padding:16px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;}
#drawer-head h3{font-size:13px;font-weight:700;color:var(--g700);text-transform:uppercase;letter-spacing:.5px;}
#drawer-date{font-size:11px;color:var(--g500);}
#drawer-add-row{padding:12px 16px;border-bottom:1px solid var(--g100);display:flex;gap:8px;}
#drawer-add-input{flex:1;padding:8px 10px;border:1px solid var(--g200);border-radius:var(--rsm);
                  font-family:'Raleway',sans-serif;font-size:13px;outline:none;background:var(--g50);}
#drawer-add-input:focus{border-color:var(--verde);}
#drawer-add-btn{background:var(--verde);color:#fff;border:none;border-radius:var(--rsm);
                padding:8px 12px;cursor:pointer;font-size:16px;font-weight:700;}
#drawer-list{flex:1;overflow-y:auto;padding:8px 0;}
.tv-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:background .15s;
         border-bottom:1px solid var(--g50);}
.tv-item:hover{background:var(--g50);}
.tv-item.done .tv-text{text-decoration:line-through;color:var(--g300);}
.tv-check{width:18px;height:18px;border:2px solid var(--g300);border-radius:4px;flex-shrink:0;
          display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.tv-check.checked{background:var(--verde);border-color:var(--verde);color:#fff;}
.tv-text{flex:1;font-size:13px;color:var(--g700);}
.tv-link{font-size:10px;color:var(--g500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}
.tv-del{color:var(--g300);font-size:14px;cursor:pointer;flex-shrink:0;padding:2px 4px;}
.tv-del:hover{color:var(--red);}
#drawer-drop-zone{margin:8px 16px;padding:10px;border:2px dashed var(--g200);border-radius:var(--rsm);
                  text-align:center;font-size:12px;color:var(--g300);transition:all .2s;}
#drawer-drop-zone.drag-over{border-color:var(--verde);color:var(--verde);background:var(--accent-light);}

/* ---- PAGE HEADER ---- */
.pg-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.pg-title{font-size:22px;font-weight:700;color:var(--g900);}
.pg-sub{font-size:13px;color:var(--g500);margin-top:2px;}

/* ---- FILTRI ---- */
#filtri-bar{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:14px 20px;
            margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:var(--sh-sm);}
.filtro-group{display:flex;align-items:center;gap:8px;}
.filtro-group label{font-size:12px;font-weight:600;color:var(--g500);white-space:nowrap;}
.filtro-input,.filtro-sel{padding:7px 12px;border:1px solid var(--g200);border-radius:var(--rsm);
                          font-family:'Raleway',sans-serif;font-size:13px;color:var(--g700);
                          outline:none;transition:border-color .2s;background:#fff;}
.filtro-input:focus,.filtro-sel:focus{border-color:var(--verde);}
#filtri-reset{background:none;border:1px solid var(--g200);border-radius:var(--rsm);padding:7px 14px;
              font-family:'Raleway',sans-serif;font-size:12px;font-weight:600;color:var(--g500);cursor:pointer;}
#filtri-reset:hover{border-color:var(--red);color:var(--red);}

/* ---- BOARD (accordion + task orizzontali) ---- */
#board-wrap{overflow-x:auto;border-radius:var(--r);}
.board-table{border-collapse:separate;border-spacing:0;min-width:900px;width:100%;}

/* Prima colonna sticky */
.board-table .col-label{
  position:sticky;left:0;z-index:20;background:#fff;
  min-width:220px;max-width:260px;width:240px;
  border-right:2px solid var(--g200);
}
.board-table thead .col-label{background:var(--g100);}

/* Header colonna label */
.board-th-label{
  padding:10px 16px;font-size:11px;font-weight:700;color:var(--g500);
  text-transform:uppercase;letter-spacing:.5px;background:var(--g100);
  border-bottom:2px solid var(--g200);
}
.board-th-tasks{
  padding:10px 16px;font-size:11px;font-weight:700;color:var(--g500);
  text-transform:uppercase;letter-spacing:.5px;background:var(--g100);
  border-bottom:2px solid var(--g200);white-space:nowrap;
}

/* Righe accordion */
.acc-row-cat,.acc-row-sub,.acc-row-proj{
  cursor:pointer;
  transition:background .15s;
}
/* Categoria */
.acc-row-cat .col-label{
  background:var(--g100);border-bottom:1px solid var(--g200);
}
.acc-row-cat:hover .col-label{background:var(--g200);}
.cat-label{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;font-size:12.5px;font-weight:700;color:var(--g700);
  text-transform:uppercase;letter-spacing:.3px;
}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.acc-chevron{font-size:10px;transition:transform .2s;margin-left:0;}
.acc-chevron.open{transform:rotate(90deg);}

/* Sottocategoria */
.acc-row-sub .col-label{
  background:#fff;border-bottom:1px solid var(--g100);
}
.acc-row-sub:hover .col-label{background:var(--g50);}
.sub-label{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px 8px 16px;font-size:12px;font-weight:600;color:var(--g500);
  letter-spacing:.2px;
}

/* Progetto */
.acc-row-proj .col-label{
  background:#fff;border-bottom:1px solid var(--g100);
}
.acc-row-proj:hover .col-label{background:var(--g50);}
.proj-label{
  display:flex;flex-direction:column;align-items:flex-start;
  padding:7px 12px 7px 16px;font-size:13px;font-weight:600;color:var(--g900);
  width:100%;cursor:pointer;
}
.proj-label-top{display:flex;align-items:center;gap:6px;width:100%;}
.proj-label-bottom{display:flex;align-items:center;gap:5px;margin-top:4px;padding-left:0px;}
.proj-meta{font-size:10px;color:var(--g500);white-space:nowrap;}
.proj-owner-prefix{font-size:10px;color:var(--g500);font-style:italic;margin-bottom:2px;}

/* Cella task (orizzontale) */
.tasks-cell{
  padding:6px 12px;vertical-align:top;
  border-bottom:1px solid var(--g100);
}
.tasks-chains{
  display:flex;flex-direction:column;gap:4px;padding:4px 0;
}
.tasks-row{
  display:flex;align-items:center;gap:8px;min-height:36px;flex-wrap:nowrap;
}
/* Task card */
.task-card{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:var(--rsm);border:1.5px solid transparent;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .17s;user-select:none;white-space:nowrap;
  max-width:180px;overflow:hidden;text-overflow:ellipsis;
  position:relative;
}
.task-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md);}
.task-card.dragging{opacity:.5;transform:scale(.97);}
.task-card.drag-over-left::before{
  content:'';position:absolute;left:-4px;top:0;bottom:0;width:3px;
  background:var(--verde);border-radius:2px;
}
.task-card.drag-over-right::after{
  content:'';position:absolute;right:-4px;top:0;bottom:0;width:3px;
  background:var(--verde);border-radius:2px;
}
.tasks-row.drag-over-row{
  background:var(--accent-light);border-radius:var(--rsm);outline:2px dashed var(--verde);
}
/* Colori per stato */
.task-card.s-aperto{background:#fff;border-color:var(--g200);color:var(--g700);}
.task-card.s-in_corso{background:var(--yellow-light);border-color:var(--yellow);color:#8a5500;}
.task-card.s-completato{background:var(--green-light);border-color:var(--verde);color:#3d5a14;}
.task-card.s-bloccato{background:var(--red-light);border-color:var(--red);color:var(--red);}
.task-card.s-annullato{background:var(--g100);border-color:var(--g200);color:var(--g300);text-decoration:line-through;}
.task-dep-icon{font-size:10px;opacity:.7;}
.task-flag{display:inline-block;width:8px;height:8px;border-radius:50%;
           background:var(--orange);flex-shrink:0;margin-right:4px;
           box-shadow:0 0 0 2px rgba(212,118,42,.25);}
/* drawer task prioritari */
.tv-item.prioritario .tv-text{font-weight:700;color:var(--g900);}
.tv-item.prioritario::before{content:'';display:block;width:4px;border-radius:2px;
  background:var(--orange);align-self:stretch;flex-shrink:0;margin-left:-6px;}
.tv-item.prioritario{padding-left:10px;border-left:3px solid var(--orange);}
/* multiselect dropdown categorie */
.ms-wrap{position:relative;}
.ms-trigger{min-width:180px;padding:7px 30px 7px 12px;border:1px solid var(--g200);border-radius:var(--rsm);
  font-family:'Raleway',sans-serif;font-size:13px;color:var(--g700);background:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;gap:6px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;}
.ms-trigger::after{content:'▾';font-size:10px;color:var(--g500);flex-shrink:0;}
.ms-dropdown{position:absolute;top:calc(100% + 4px);left:0;z-index:500;
  background:#fff;border:1px solid var(--g200);border-radius:var(--r);
  box-shadow:var(--sh-lg);min-width:220px;display:none;flex-direction:column;}
.ms-dropdown.open{display:flex;}
.ms-search{padding:8px 12px;border-bottom:1px solid var(--g100);}
.ms-search input{width:100%;border:1px solid var(--g200);border-radius:var(--rsm);
  padding:5px 10px;font-family:'Raleway',sans-serif;font-size:13px;outline:none;}
.ms-search input:focus{border-color:var(--verde);}
.ms-list{max-height:200px;overflow-y:auto;padding:4px 0;}
.ms-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;font-size:13px;color:var(--g700);}
.ms-item:hover{background:var(--g50);}
.ms-item input{accent-color:var(--verde);width:14px;height:14px;flex-shrink:0;cursor:pointer;}
.ms-clear{padding:8px 14px;border-top:1px solid var(--g100);font-size:12px;color:var(--g500);
  cursor:pointer;text-align:center;}
.ms-clear:hover{color:var(--red);}
/* Freccia dipendenza tra task */
.task-dep-arrow{color:var(--g300);font-size:14px;flex-shrink:0;}

/* Riga nuova task parallela */
.tasks-row-new{opacity:.55;transition:opacity .2s;}
.tasks-row-new:hover{opacity:1;}
/* Drop zone nuova riga parallela */
.tasks-new-row-drop{
  min-height:28px;border:1.5px dashed var(--g200);border-radius:var(--rsm);
  cursor:default;opacity:0;transition:opacity .2s,border-color .2s,background .2s;
  align-items:center;padding:0 10px;
}
.tasks-new-row-drop:hover,.tasks-new-row-drop.drag-over-row{
  opacity:1;border-color:var(--verde);background:var(--accent-light);
}
/* mostra sempre la zona durante un drag attivo */
body.is-dragging .tasks-new-row-drop{opacity:.6;}
body.is-dragging .tasks-new-row-drop:hover{opacity:1;}
.new-row-hint{font-size:11px;color:var(--g300);white-space:nowrap;pointer-events:none;}
body.is-dragging .new-row-hint{color:var(--verde);}

/* Add task button */
.add-task-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:50%;border:1.5px dashed var(--g200);
  background:none;color:var(--g300);cursor:pointer;font-size:18px;flex-shrink:0;
  transition:all .17s;
}
.add-task-btn:hover{border-color:var(--verde);color:var(--verde);background:var(--accent-light);}

/* Cella task per righe categoria/sottocategoria (vuota ma con sfondo) */
.tasks-cell-cat{background:var(--g100);border-bottom:1px solid var(--g200);}
.tasks-cell-sub{background:var(--g50);border-bottom:1px solid var(--g100);}

/* ---- CONTEXT MENU ---- */
#ctx-menu{
  position:fixed;background:#fff;border:1px solid var(--g200);border-radius:var(--r);
  box-shadow:var(--sh-lg);z-index:10000;min-width:180px;padding:6px 0;
  display:none;
}
#ctx-menu.show{display:block;}
.ctx-item{
  padding:8px 16px;font-size:13px;color:var(--g700);cursor:pointer;
  display:flex;align-items:center;gap:10px;transition:background .15s;
}
.ctx-item:hover{background:var(--g50);}
.ctx-item .ctx-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ctx-sep{height:1px;background:var(--g100);margin:4px 0;}

/* ---- MODALE GENERICA ---- */
#modal-overlay{
  position:fixed;inset:0;background:rgba(74,76,77,.45);z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
#modal-overlay.show{opacity:1;pointer-events:all;}
#modal-box{
  background:#fff;border-radius:var(--rlg);padding:32px 36px;width:100%;max-width:560px;
  max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg);
  transform:translateY(16px);transition:transform .2s;
}
#modal-overlay.show #modal-box{transform:translateY(0);}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.modal-title{font-size:17px;font-weight:700;color:var(--g900);}
.modal-close{background:none;border:none;font-size:22px;color:var(--g300);cursor:pointer;padding:0 4px;}
.modal-close:hover{color:var(--g700);}
.mfield{margin-bottom:16px;}
.mfield label{display:block;font-size:12px;font-weight:600;color:var(--g700);letter-spacing:.4px;margin-bottom:6px;}
.mfield input,.mfield textarea,.mfield select{
  width:100%;padding:10px 14px;border:1px solid var(--g200);border-radius:var(--rsm);
  font-family:'Raleway',sans-serif;font-size:14px;color:var(--g900);outline:none;
  transition:border-color .2s;background:#fff;
}
.mfield input:focus,.mfield textarea:focus,.mfield select:focus{border-color:var(--verde);}
.mfield textarea{resize:vertical;min-height:80px;}
.mfield-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.mfield-hint{font-size:11px;color:var(--g500);margin-top:4px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;}
.mbtn{padding:10px 22px;border-radius:var(--rsm);font-family:'Raleway',sans-serif;
      font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .17s;}
.mbtn-primary{background:var(--verde);color:#fff;}
.mbtn-primary:hover{opacity:.88;}
.mbtn-secondary{background:var(--g100);color:var(--g700);border:1px solid var(--g200);}
.mbtn-secondary:hover{background:var(--g200);}

const $   = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const p2  = n => String(n).padStart(2,'0');

function fmt(d){
  if(!d) return '—';
  const dt = typeof d==='string'?new Date(d.length===10?d+'T00:00:00':d):d;
  return dt.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function dateToStr(d){ return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
function today(){ return dateToStr(new Date()); }

let _tid;
function toast(msg,type='ok'){
  const el=$('toast'); clearTimeout(_tid);
  el.textContent=msg; el.className=`show t${type}`;
  _tid=setTimeout(()=>el.className='',3200);
}

function openConf(title,msg){
  return new Promise(res=>{
    $('conf-title').textContent=title;
    $('conf-msg').textContent=msg;
    const ov=$('conf-overlay'); ov.style.display='flex';
    const yes=$('conf-yes'), no=$('conf-no');
    const cleanup=()=>{ ov.style.display='none'; yes.onclick=null; no.onclick=null; };
    yes.onclick=()=>{ cleanup(); res(true); };
    no.onclick =()=>{ cleanup(); res(false); };
  });
}

// ============================================================
// SUPABASE REST
// ============================================================
async function db(method, table, opts={}){
  const {flt='',body=null,sel='*',ord='',lim='',prefer=''}=opts;
  let url=`${CFG.URL}/rest/v1/${table}?select=${sel}`;
  if(flt) url+=`&${flt}`;
  if(ord) url+=`&order=${ord}`;
  if(lim) url+=`&limit=${lim}`;
  const headers={
    'apikey':CFG.KEY,
    'Authorization':`Bearer ${S.token||CFG.KEY}`,
    'Content-Type':'application/json',
    'Prefer': prefer || (method==='POST'?'return=representation':''),
  };
  const res=await fetch(url,{method,headers,body:body?JSON.stringify(body):undefined});
  if(!res.ok){const e=await res.text();throw new Error(`${method} ${table}: ${e}`);}
  if(method==='DELETE'||method==='PATCH') return null;
  return res.json();
}

async function supaLogin(email,pwd){
  const res=await fetch(`${CFG.URL}/auth/v1/token?grant_type=password`,{
    method:'POST',
    headers:{'apikey':CFG.KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email,password:pwd}),
  });
  const data=await res.json();
  if(!res.ok) throw new Error(data.error_description||data.message||'Errore login');
  return data;
}

async function fn(name, body){
  const res=await fetch(`${CFG.FN}/${name}`,{
    method:'POST',
    headers:{'Authorization':`Bearer ${S.token}`,'Content-Type':'application/json'},
    body:JSON.stringify(body),
  });
  return res.json();
}

async function writeLog(azione, entita, entitaId, dettaglio={}){
  try {
    await db('POST', T('log'), {
      body: {
        utente_id: S.user.id,
        azione, entita, entita_id: entitaId,
        dettaglio: { ...dettaglio, utente: `${S.user.nome} ${S.user.cognome}` }
      }
    });
  } catch(e){ /* log non bloccante */ }
}

// ============================================================
// LOAD ALL
// ============================================================
async function loadAll(){
  const [profili,categorie,sottocategorie,progetti,permessi,task,dipendenze,taskVeloci] = await Promise.all([
    db('GET', T('profili'),        {ord:'cognome.asc,nome.asc'}),
    db('GET', T('categorie'),      {ord:'ordine.asc,nome.asc'}),
    db('GET', T('sottocategorie'), {ord:'ordine.asc,nome.asc'}),
    db('GET', T('progetti'),       {ord:'ordine.asc,nome.asc'}),
    db('GET', T('permessi'),       {}),
    db('GET', T('task'),           {ord:'riga.asc,posizione.asc'}),
    db('GET', T('task_dipendenze'),{}),
    db('GET', T('task_veloci'),    {flt:`data_riferimento=eq.${today()}`,ord:'ordine.asc'}),
  ]);
  S.profili=profili||[]; S.categorie=categorie||[];
  S.sottocategorie=sottocategorie||[]; S.progetti=progetti||[];
  S.permessi=permessi||[]; S.task=task||[];
  S.dipendenze=dipendenze||[]; S.taskVeloci=taskVeloci||[];
}

async function loadLog(da, a, testo){
  // Default: solo oggi
  const oggi = today();
  const dataDa = da || oggi;
  const dataA  = a  || oggi;
  // Supabase: gte/lte su timestamptz — aggiungiamo T00:00:00 e T23:59:59
  let flt = `created_at=gte.${dataDa}T00:00:00&created_at=lte.${dataA}T23:59:59`;
  let rows = await db('GET', T('log'), {ord:'created_at.desc', lim:'500', flt});
  if(testo && testo.trim()){
    const q = testo.trim().toLowerCase();
    rows = rows.filter(l=>
      (l.azione||'').toLowerCase().includes(q) ||
      (l.entita||'').toLowerCase().includes(q) ||
      profiloNome(l.utente_id).toLowerCase().includes(q) ||
      JSON.stringify(l.dettaglio||{}).toLowerCase().includes(q)
    );
  }
  S.log = rows;
}

// LOGO
// ============================================================

}

// ============================================================
// TOPBAR / NAV
// ============================================================
const NAV = [
  { id:'board',      label:'Board',      always:true },
  { id:'categorie',  label:'Categorie',  always:true },
  { id:'utenti',     label:'Utenti',     admin:true  },
  { id:'log',        label:'Log',        admin:true  },
];

function renderSidebar(){
  const isAdmin = S.user?.ruolo==='admin';
  $('tb-user').textContent = `${S.user.nome} ${S.user.cognome}`;
  $('tb-role').textContent = isAdmin ? 'Admin' : 'Utente';
  const adminPages = ['utenti','log'];
  const isAdminPage = adminPages.includes(S.page);
  const mainNav = NAV.filter(n=>n.always&&!n.admin);
  let html = mainNav.map(n=>
    `<button class="tnb${S.page===n.id?' active':''}" onclick="goPage('${n.id}')">${n.label}</button>`
  ).join('');
  if(isAdmin){
    html += `<div class="tnb-admin-wrap${isAdminPage?' active':''}">
      <button class="tnb${isAdminPage?' active':''}" onclick="toggleAdminMenu(event)">Admin ▾</button>

        ${NAV.filter(n=>n.admin).map(n=>

        ).join('')}
      </div>
    </div>`;
  }
  $('tb-nav').innerHTML = html;

function toggleAdminMenu(e){
  e.stopPropagation();
  const m=$('admin-menu'); if(!m) return;
  m.classList.toggle('open');
}
document.addEventListener('click',()=>{
  const m=$('admin-menu'); if(m) m.classList.remove('open');
});

function goPage(pg){
  S.page=pg; renderSidebar();
  const pb=$('pb');
  if(pg==='board')       renderBoard(pb);
  else if(pg==='categorie') renderCategoriePage(pb);
  else if(pg==='utenti') renderUtenti(pb);
  else if(pg==='log')    renderLogPage(pb);
}

// ============================================================
// LOGIN
// ============================================================
async function doLogin(){
  const email=$('lem').value.trim(), pwd=$('lpw').value;
  const btn=$('lbtn'), err=$('lerr');
  err.style.display='none';
  if(!email||!pwd){err.textContent='Inserisci email e password.';err.style.display='block';return;}
  btn.innerHTML='<span class="spn"></span> Accesso…'; btn.disabled=true;
  try{
    const auth=await supaLogin(email,pwd);
    S.token=auth.access_token;
    const [profilo]=await db('GET',T('profili'),{flt:`id=eq.${auth.user.id}`});
    if(!profilo) throw new Error('Profilo non trovato. Contatta l\'amministratore.');
    if(profilo.attivo===false) throw new Error('Utente disabilitato. Contatta l\'amministratore.');
    S.user=profilo;
    await loadAll();
    $('lp').classList.add('hid'); $('app').classList.remove('hid');
    initDrawer(); renderSidebar(); goPage('board');
  }catch(e){
    err.textContent=e.message; err.style.display='block';
    btn.innerHTML='Accedi'; btn.disabled=false;
  }
}
function doLogout(){S.token=null;S.user=null;$('app').classList.add('hid');$('lp').classList.remove('hid');}

// ============================================================
// HELPERS: profilo display, permessi
// ============================================================
function profiloById(id){ return S.profili.find(p=>p.id===id)||null; }
function profiloNome(id){ const p=profiloById(id); return p?`${p.nome} ${p.cognome}`:'—'; }

function canWriteProgetto(proj){
  if(S.user.ruolo==='admin') return true;
  if(proj.utente_id===S.user.id) return true;
  return S.permessi.some(p=>p.progetto_id===proj.id&&p.utente_id===S.user.id&&p.livello==='write');
}
function isOwner(proj){ return proj.utente_id===S.user.id||S.user.ruolo==='admin'; }

// ============================================================
// RENDER BOARD
// ============================================================
function renderBoard(pb){
  const f=S.boardFilter;
  // Costruisco albero: categorie → sottocategorie → progetti
  // Includo anche progetti senza categoria
  let progetti = S.progetti;

  // Filtro testo
  if(f.testo){
    const q=f.testo.toLowerCase();
    progetti=progetti.filter(p=>
      p.nome.toLowerCase().includes(q)||
      (p.descrizione||'').toLowerCase().includes(q)||
      S.task.filter(t=>t.progetto_id===p.id&&t.nome.toLowerCase().includes(q)).length>0
    );
  }
  // Filtro categoria
  if(f.categoria_id){
    progetti=progetti.filter(p=>p.categoria_id===f.categoria_id);
  }
  // Filtro sottocategoria
  if(f.sottocategoria_id){
    progetti=progetti.filter(p=>p.sottocategoria_id===f.sottocategoria_id);
  }

  // Filtro task per stato/priorità se flag attivi
  let taskVisibili = S.task;
  if(f.hide_completati)     taskVisibili = taskVisibili.filter(t=>t.stato!=='completato');
  if(f.hide_annullati)      taskVisibili = taskVisibili.filter(t=>t.stato!=='annullato');
  if(f.hide_non_prioritari) taskVisibili = taskVisibili.filter(t=>t.is_prioritario);

  // Filtro categorie multi-select
  const catUsed = new Set(progetti.map(p=>p.categoria_id).filter(Boolean));
  const myCatIds = new Set(S.categorie.filter(c=>c.utente_id===S.user.id).map(c=>c.id));
  const activeCatIds = f.categorie_ids && f.categorie_ids.length > 0 ? new Set(f.categorie_ids) : null;
  let cats;
  if(activeCatIds){
    cats = S.categorie.filter(c=>activeCatIds.has(c.id));
    // filtra anche i progetti per categorie selezionate
    progetti = progetti.filter(p=>p.categoria_id && activeCatIds.has(p.categoria_id));
  } else {
    cats = S.categorie.filter(c=>myCatIds.has(c.id)||catUsed.has(c.id));
  }
  const progettiSenzaCat = activeCatIds ? [] : progetti.filter(p=>!p.categoria_id);
  // Filtro hide_non_prioritari
  if(f.hide_non_prioritari) progetti = progetti.filter(p=>
    S.task.some(t=>t.progetto_id===p.id && t.is_prioritario)
  );

  // Categorie per il filtro (tutte)
  const myCats = S.categorie.filter(c=>c.utente_id===S.user.id);

  pb.innerHTML=`
  <div class="pg-head">

function renderBoardRows(cats, progettiSenzaCat, allProjFiltered, taskVisibili){
  const tbody = $('board-tbody');
  if(!tbody) return;
  let rows = '';

  // Categorie con i loro progetti
  for(const cat of cats){
    const isExpCat = S.boardExpanded['cat_'+cat.id] !== false; // default espanso
    const subs = S.sottocategorie.filter(s=>s.categoria_id===cat.id);
    const subUsed = new Set(allProjFiltered.filter(p=>p.categoria_id===cat.id).map(p=>p.sottocategoria_id).filter(Boolean));
    const progettiInCatNoSub = allProjFiltered.filter(p=>p.categoria_id===cat.id&&!p.sottocategoria_id);
    const catOwner = profiloById(cat.utente_id);
    const isOwnCat = cat.utente_id===S.user.id;
    const catLabel = isOwnCat ? esc(cat.nome) : `${esc(catOwner?.nome||'')} ${esc(catOwner?.cognome||'')} | ${esc(cat.nome)}`;

    rows += `<tr class="acc-row-cat" onclick="toggleAcc('cat_${cat.id}')">
      <td class="col-label">
        <div class="cat-label">
          <span class="cat-dot" style="background:${esc(cat.colore)}"></span>
          <span style="flex:1">${catLabel}</span>
          <button class="add-task-btn" style="font-size:13px;width:24px;height:24px;" title="Nuova sottocategoria" onclick="event.stopPropagation();openSubcatModal('${cat.id}')">+</button>
          <span class="acc-chevron ${isExpCat?'open':''}">▶</span>
        </div>
      </td>
      <td class="tasks-cell tasks-cell-cat"></td>
    </tr>`;

    if(isExpCat){
      // Sottocategorie
      for(const sub of subs){
        const isExpSub = S.boardExpanded['sub_'+sub.id] !== false;
        const progsInSub = allProjFiltered.filter(p=>p.sottocategoria_id===sub.id);
        rows += `<tr class="acc-row-sub" onclick="toggleAcc('sub_${sub.id}')">
          <td class="col-label">
            <div class="sub-label">
              <span style="flex:1">${esc(sub.nome)}</span>
              <button class="add-task-btn" style="font-size:13px;width:24px;height:24px;" title="Nuovo progetto in questa sottocategoria" onclick="event.stopPropagation();openProgettoModal(null,'${cat.id}','${sub.id}')">+</button>
              <span class="acc-chevron ${isExpSub?'open':''}">▶</span>
            </div>
          </td>
          <td class="tasks-cell tasks-cell-sub"></td>
        </tr>`;
        if(isExpSub){
          for(const proj of progsInSub){
            rows += buildProgettoRow(proj, 3, taskVisibili);
          }
        }
      }
      // Progetti nella categoria senza sottocategoria
      for(const proj of progettiInCatNoSub){
        rows += buildProgettoRow(proj, 2, taskVisibili);
      }
    }
  }

  // Progetti senza categoria
  if(progettiSenzaCat.length>0){
    rows += `<tr class="acc-row-cat" onclick="toggleAcc('nocat')">
      <td class="col-label">
        <div class="cat-label">
          <span class="cat-dot" style="background:var(--g300)"></span>
          <span style="flex:1">Senza categoria</span>
          <span class="acc-chevron ${S.boardExpanded['nocat']!==false?'open':''}">▶</span>
        </div>
      </td>
      <td class="tasks-cell tasks-cell-cat"></td>
    </tr>`;
    if(S.boardExpanded['nocat']!==false){
      for(const proj of progettiSenzaCat){ rows+=buildProgettoRow(proj,2,taskVisibili); }
    }
  }

  if(!rows){
    tbody.innerHTML=`<tr><td colspan="2" style="padding:40px;text-align:center;color:var(--g300);font-size:14px;">
      Nessun progetto trovato. Prova a cambiare i filtri o crea un nuovo progetto.
    </td></tr>`;
    renderBoardFooter([],[]);
    return;
  }
  tbody.innerHTML=rows;
  renderBoardFooter(allProjFiltered, taskVisibili||S.task);
}

function renderBoardFooter(progettiVisibili, taskVisibili){
  const footer=$('board-footer'); if(!footer) return;
  const nCat  = S.categorie.filter(c=>c.utente_id===S.user.id).length;
  const nSub  = S.sottocategorie.filter(s=>s.utente_id===S.user.id).length;
  const nProj = S.progetti.length;
  const nTask = S.task.length;
  const nProjV = progettiVisibili.length;
  const nTaskV = taskVisibili.filter(t=>progettiVisibili.some(p=>p.id===t.progetto_id)).length;
  const nPrio  = S.task.filter(t=>t.is_prioritario && t.stato!=='completato' && t.stato!=='annullato').length;
  const nComp  = S.task.filter(t=>t.stato==='completato').length;
  const filtered = nProjV < nProj || nTaskV < nTask;
  footer.innerHTML=`
    <div class="bf-stat"><strong>${nCat}</strong> categor${nCat===1?'ia':'ie'}</div>
    <div class="bf-sep"></div>
    <div class="bf-stat"><strong>${nSub}</strong> sottocategor${nSub===1?'ia':'ie'}</div>
    <div class="bf-sep"></div>
    <div class="bf-stat"><strong>${filtered?nProjV+'/':''}${nProj}</strong> progett${nProj===1?'o':'i'}</div>
    <div class="bf-sep"></div>
    <div class="bf-stat"><strong>${filtered?nTaskV+'/':''}${nTask}</strong> task</div>
    ${nPrio>0?`<div class="bf-sep"></div>
    <div class="bf-stat" style="color:var(--orange);">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--orange);display:inline-block;margin-right:2px;"></span>
      <strong style="color:var(--orange);">${nPrio}</strong>&nbsp;prioritar${nPrio===1?'io':'i'}
    </div>`:''}
    ${nComp>0?`<div class="bf-sep"></div>
    <div class="bf-stat">
      <strong style="color:var(--verde);">${nComp}</strong>&nbsp;completat${nComp===1?'o':'i'}
    </div>`:''}
  `;
}

function buildProgettoRow(proj, indent, taskVisibili){
  const isExpProj = S.boardExpanded['proj_'+proj.id] !== false;
  const allTasks = S.task.filter(t=>t.progetto_id===proj.id).sort((a,b)=>(a.riga??0)-(b.riga??0)||a.posizione-b.posizione);
  const tasks = (taskVisibili||S.task).filter(t=>t.progetto_id===proj.id).sort((a,b)=>(a.riga??0)-(b.riga??0)||a.posizione-b.posizione);
  const projNextRiga = allTasks.length > 0 ? Math.max(...allTasks.map(t=>t.riga??0))+1 : 0;
  const owner = profiloById(proj.utente_id);
  const isOwn = proj.utente_id===S.user.id;
  const canWrite = canWriteProgetto(proj);
  const ownerPrefix = !isOwn ? `<div class="proj-owner-prefix">${esc(owner?.nome||'')} ${esc(owner?.cognome||'')}</div>` : '';

  let taskHtml = '';
  if(isExpProj){
    taskHtml = buildTasksRow(tasks, proj, canWrite, projNextRiga);
  }

  // stato badge colore
  const statiColor = {aperto:'var(--g200)',in_corso:'var(--yellow)',completato:'var(--verde)',sospeso:'var(--orange)',annullato:'var(--g300)'};
  const sc = statiColor[proj.stato]||'var(--g200)';

  return `<tr class="acc-row-proj" onclick="toggleAcc('proj_${proj.id}')">
    <td class="col-label">
      <div class="proj-label">
        <div class="proj-label-top">
          <div style="flex:1;min-width:0;">
            ${ownerPrefix}
            <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px;font-weight:600;" title="${esc(proj.nome)}">${esc(proj.nome)}</div>
          </div>
          <span class="acc-chevron ${isExpProj?'open':''}">▶</span>
        </div>
        <div class="proj-label-bottom">
          <span class="proj-meta">${allTasks.length} task</span>
          <span style="color:var(--g200);font-size:10px;">|</span>
          <button class="act-btn" style="font-size:10px;padding:1px 6px;" onclick="event.stopPropagation();openProgettoModal('${proj.id}')" title="Modifica progetto">Modifica</button>
          <button class="act-btn" style="font-size:10px;padding:1px 6px;" onclick="event.stopPropagation();openPermessiModal('${proj.id}')" title="Permessi">Permessi</button>
        </div>
      </div>
      ${canWrite?`<button class="add-task-btn" onclick="event.stopPropagation();openTaskModalNewRow('${proj.id}')" title="Nuovo task in nuova riga"
        style="position:absolute;right:-14px;top:50%;transform:translateY(-50%);z-index:25;
               background:#fff;border:1.5px solid var(--verde);color:var(--verde);width:28px;height:28px;font-size:16px;
               border-radius:50%;box-shadow:var(--sh-sm);">+</button>`:''}
    </td>
    <td class="tasks-cell" id="tasks-cell-${proj.id}" 
        ondragover="onDragOverCell(event,'${proj.id}')" 
        ondrop="onDropCell(event,'${proj.id}')">
      ${isExpProj ? taskHtml : ''}
    </td>
  </tr>`;
}

function buildTasksRow(tasks, proj, canWrite, nextRiga){
  nextRiga = nextRiga ?? (tasks.length > 0 ? Math.max(...tasks.map(t=>t.riga??0))+1 : 0);
  // Raggruppa task per riga (campo 'riga', default 0)
  const righe = {};
  for(const t of tasks){
    const r = t.riga ?? 0;
    if(!righe[r]) righe[r] = [];
    righe[r].push(t);
  }
  const righeKeys = Object.keys(righe).map(Number).sort((a,b)=>a-b);
  if(righeKeys.length === 0 && !canWrite){
    return `<div class="tasks-chains"><div class="tasks-row"><span style="font-size:12px;color:var(--g300);">Nessun task</span></div></div>`;
  }

  let html = '<div class="tasks-chains">';
  for(const rk of righeKeys){
    const rowTasks = righe[rk].sort((a,b)=>a.posizione-b.posizione);
    html += `<div class="tasks-row" 
      data-proj-id="${proj.id}" data-riga="${rk}"
      ondragover="onDragOverRow(event,this,'${proj.id}',${rk})"
      ondrop="onDropRow(event,'${proj.id}',${rk})"
      ondragleave="onDragLeaveRow(this)">`;
    for(let i=0;i<rowTasks.length;i++){
      const t=rowTasks[i];
      if(i>0) html+=`<span class="task-dep-arrow">→</span>`;
      html+=`<div class="task-card s-${t.stato}" 
        data-task-id="${t.id}"
        draggable="true"
        ondragstart="onDragStartTask(event,'${t.id}','${proj.id}',${rk})"
        ondragend="onDragEndTask(event)"
        ondragover="onDragOverTask(event,this,'${t.id}')"
        ondrop="onDropTask(event,'${t.id}','${proj.id}',${rk})"
        onclick="event.stopPropagation();openTaskDetail('${t.id}')"
        oncontextmenu="showCtxMenu(event,'${t.id}')">
        ${t.is_prioritario?'<span class="task-flag"></span>':''}${esc(t.nome)}
      </div>`;
    }
    html += '</div>';
  }
  // Drop zone per creare nuova riga parallela trascinando
  if(canWrite){
    const dropNextRiga = righeKeys.length > 0 ? Math.max(...righeKeys)+1 : 0;
    html += `<div class="tasks-row tasks-new-row-drop"
      data-proj-id="${proj.id}" data-riga="${dropNextRiga}"
      ondragover="onDragOverNewRow(event,this)"
      ondrop="onDropRow(event,'${proj.id}',${dropNextRiga})"
      ondragleave="onDragLeaveRow(this)"
      title="Trascina qui per creare una nuova riga parallela">
      <span class="new-row-hint">+ nuova riga parallela</span>
    </div>`;
  }
  html += '</div>';
  return html;
}

function toggleAcc(key){
  S.boardExpanded[key] = S.boardExpanded[key]===false ? true : false;
  const pb=$('pb'); renderBoard(pb);
}

let _fTid;
function onFiltroTesto(v){

}
function onFiltroCat(v){

  goPage('board');
}
function onFiltroSub(v){ S.boardFilter.sottocategoria_id=v; goPage('board'); }

function resetFiltri(){
  S.boardFilter={testo:'',categorie_ids:[],categoria_id:'',sottocategoria_id:'',

// Multiselect categorie
function toggleMsCat(e){
  e.stopPropagation();
  const dd=$('ms-cat-dd'); if(!dd) return;
  dd.classList.toggle('open');
}
function filterMsCat(q){
  const list=$('ms-cat-list'); if(!list) return;
  list.querySelectorAll('.ms-item').forEach(item=>{
    const txt=item.textContent.toLowerCase();
    item.style.display=txt.includes(q.toLowerCase())?'':'none';
  });
}
function onMsCatChange(){
  const checkboxes=$('ms-cat-list')?.querySelectorAll('input[type=checkbox]');
  if(!checkboxes) return;
  const ids=[...checkboxes].filter(c=>c.checked).map(c=>c.value);
  S.boardFilter.categorie_ids=ids;
  // Aggiorna solo la label del trigger senza ricostruire il DOM
  const trigger=$('ms-cat-trigger');
  if(trigger) trigger.innerHTML=
    (ids.length===0?'Tutte':ids.length+' selezionat'+(ids.length===1?'a':'e'))+
    ' <span style="font-size:10px;color:var(--g500);">▾</span>';
  // Aggiorna solo il tbody del board, senza ricostruire filtri-bar
  refreshBoardOnly();
}
function clearMsCat(){
  S.boardFilter.categorie_ids=[];
  const trigger=$('ms-cat-trigger');
  if(trigger) trigger.innerHTML='Tutte <span style="font-size:10px;color:var(--g500);">▾</span>';
  const checkboxes=$('ms-cat-list')?.querySelectorAll('input[type=checkbox]');
  if(checkboxes) checkboxes.forEach(c=>c.checked=false);
  refreshBoardOnly();
}
function refreshBoardOnly(){
  // Ricalcola e ridisegna solo le righe del board, lasciando intatta la filtri-bar
  renderDrawer();
  const pb=$('pb'); if(!pb) return;
  const boardWrap=$('board-wrap');
  if(!boardWrap){ renderBoard(pb); return; }
  const f=S.boardFilter;
  let progetti=S.progetti;
  if(f.testo){ const q=f.testo.toLowerCase(); progetti=progetti.filter(p=>p.nome.toLowerCase().includes(q)||(p.descrizione||'').toLowerCase().includes(q)||S.task.filter(t=>t.progetto_id===p.id&&t.nome.toLowerCase().includes(q)).length>0); }
  let taskVisibili=S.task;
  if(f.hide_completati)     taskVisibili=taskVisibili.filter(t=>t.stato!=='completato');
  if(f.hide_annullati)      taskVisibili=taskVisibili.filter(t=>t.stato!=='annullato');
  if(f.hide_non_prioritari) taskVisibili=taskVisibili.filter(t=>t.is_prioritario);
  const catUsed=new Set(progetti.map(p=>p.categoria_id).filter(Boolean));
  const myCatIds=new Set(S.categorie.filter(c=>c.utente_id===S.user.id).map(c=>c.id));
  const activeCatIds=f.categorie_ids&&f.categorie_ids.length>0?new Set(f.categorie_ids):null;
  let cats;
  if(activeCatIds){ cats=S.categorie.filter(c=>activeCatIds.has(c.id)); progetti=progetti.filter(p=>p.categoria_id&&activeCatIds.has(p.categoria_id)); }
  else { cats=S.categorie.filter(c=>myCatIds.has(c.id)||catUsed.has(c.id)); }
  if(f.hide_non_prioritari) progetti=progetti.filter(p=>S.task.some(t=>t.progetto_id===p.id&&t.is_prioritario));
  const progettiSenzaCat=activeCatIds?[]:progetti.filter(p=>!p.categoria_id);
  renderBoardRows(cats,progettiSenzaCat,progetti,taskVisibili);
}

document.addEventListener('click', e=>{

// ============================================================
// DRAG & DROP TASK
// ============================================================
let _drag = null; // { taskId, projId, riga, posizione }

// Gestori sulla cella task (necessari per permettere il drop sulla riga vuota della cella)
function onDragOverCell(e, projId){
  e.preventDefault();
}
async function onDropCell(e, projId){
  e.preventDefault();
  if(!_drag) return;
  const draggedTask = S.task.find(t=>t.id===_drag.taskId);
  if(!draggedTask) return;
  const proj = S.progetti.find(p=>p.id===projId);
  if(!proj || !canWriteProgetto(proj)) return;
  // Drop su cella vuota: metti in fondo alla riga 0
  const riga = 0;
  const rowTasks = S.task
    .filter(t=>t.progetto_id===projId && (t.riga??0)===riga && t.id!==_drag.taskId)
    .sort((a,b)=>a.posizione-b.posizione);
  const newPos = rowTasks.length;
  draggedTask.riga = riga;
  draggedTask.posizione = newPos;
  draggedTask.progetto_id = projId;
  rowTasks.push(draggedTask);
  _drag = null;
  renderBoard($('pb'));
  Promise.all(rowTasks.map((t,i)=>
    db('PATCH',T('task'),{flt:`id=eq.${t.id}`,body:{posizione:i,riga,progetto_id:projId}})
  ));
}

function onDragStartTask(e, taskId, projId, riga){
  _drag = { taskId, projId: String(projId), riga: Number(riga) };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('taskId', taskId);
  setTimeout(()=>{
    const el = document.querySelector(`.task-card[data-task-id="${taskId}"]`);
    if(el) el.classList.add('dragging');
    document.body.classList.add('is-dragging');
  }, 0);
}

function onDragEndTask(e){
  document.querySelectorAll('.task-card.dragging').forEach(c=>c.classList.remove('dragging'));
  document.querySelectorAll('.task-card.drag-over-left,.task-card.drag-over-right').forEach(c=>{
    c.classList.remove('drag-over-left','drag-over-right');
  });
  document.querySelectorAll('.tasks-row.drag-over-row').forEach(r=>r.classList.remove('drag-over-row'));
  document.body.classList.remove('is-dragging');
  $('drawer-drop-zone').classList.remove('drag-over');
}

function onDragOverTask(e, el, targetTaskId){
  if(!_drag || _drag.taskId === targetTaskId) return;
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.task-card.drag-over-left,.task-card.drag-over-right').forEach(c=>{
    c.classList.remove('drag-over-left','drag-over-right');
  });
  const rect = el.getBoundingClientRect();
  const half = rect.left + rect.width / 2;
  el.classList.add(e.clientX < half ? 'drag-over-left' : 'drag-over-right');
}

async function onDropTask(e, targetTaskId, projId, riga){
  e.preventDefault(); e.stopPropagation();
  if(!_drag || _drag.taskId === targetTaskId) return;
  document.querySelectorAll('.task-card.drag-over-left,.task-card.drag-over-right').forEach(c=>{
    c.classList.remove('drag-over-left','drag-over-right');
  });

  const targetCard = document.querySelector(`.task-card[data-task-id="${targetTaskId}"]`);
  const rect = targetCard ? targetCard.getBoundingClientRect() : null;
  const insertAfter = rect ? (e.clientX > rect.left + rect.width / 2) : false;

  // Ottieni task della riga target ordinati
  let rowTasks = S.task
    .filter(t => t.progetto_id === projId && (t.riga ?? 0) === Number(riga))
    .sort((a,b) => a.posizione - b.posizione);

  // Rimuovi il task draggato dalla sua riga originale
  const draggedTask = S.task.find(t => t.id === _drag.taskId);
  if(!draggedTask) return;

  const proj = S.progetti.find(p=>p.id===projId);
  if(!proj || !canWriteProgetto(proj)) return;

  // Cambia riga se necessario
  const oldRiga = draggedTask.riga ?? 0;
  const newRiga = Number(riga);

  // Rimuovi dalla vecchia riga e riordina
  const oldRowTasks = S.task
    .filter(t => t.progetto_id === draggedTask.progetto_id && (t.riga ?? 0) === oldRiga && t.id !== _drag.taskId)
    .sort((a,b) => a.posizione - b.posizione);

  // Inserisci nella nuova riga nella posizione corretta
  rowTasks = rowTasks.filter(t => t.id !== _drag.taskId);
  const targetIdx = rowTasks.findIndex(t => t.id === targetTaskId);
  const insertIdx = insertAfter ? targetIdx + 1 : targetIdx;
  rowTasks.splice(insertIdx, 0, draggedTask);

  // Aggiorna stato locale
  draggedTask.progetto_id = projId;
  draggedTask.riga = newRiga;

  // Aggiorna posizioni in DB
  const updates = [];
  rowTasks.forEach((t,i) => {
    t.posizione = i;
    updates.push(db('PATCH', T('task'), {flt:`id=eq.${t.id}`, body:{posizione:i, riga:newRiga, progetto_id:projId}}));
  });
  // Riordina vecchia riga se diversa
  if(oldRiga !== newRiga || draggedTask.progetto_id !== projId){
    oldRowTasks.forEach((t,i) => {
      t.posizione = i;
      updates.push(db('PATCH', T('task'), {flt:`id=eq.${t.id}`, body:{posizione:i}}));
    });
  }
  // Render immediato con stato locale già aggiornato
  _drag = null;
  renderBoard($('pb'));
  // Persistenza in background
  Promise.all(updates).then(()=>writeLog('task_move','task',null,{riga:newRiga,posizione:insertIdx}));
}

function onDragOverRow(e, rowEl, projId, riga){
  e.preventDefault();
  document.querySelectorAll('.tasks-row.drag-over-row').forEach(r=>{
    if(r !== rowEl) r.classList.remove('drag-over-row');
  });
  rowEl.classList.add('drag-over-row');
}
function onDragOverNewRow(e, rowEl){
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.tasks-row.drag-over-row').forEach(r=>{
    if(r !== rowEl) r.classList.remove('drag-over-row');
  });
  rowEl.classList.add('drag-over-row');
}

function onDragLeaveRow(rowEl){
  // Piccolo delay per evitare flicker quando si va su un task figlio
  setTimeout(()=>{
    if(!rowEl.matches(':hover')) rowEl.classList.remove('drag-over-row');
  }, 80);
}

async function onDropRow(e, projId, riga){
  e.preventDefault();
  document.querySelectorAll('.tasks-row.drag-over-row').forEach(r=>r.classList.remove('drag-over-row'));
  if(!_drag) return;
  const draggedTask = S.task.find(t => t.id === _drag.taskId);
  if(!draggedTask) return;
  const proj = S.progetti.find(p=>p.id===projId);
  if(!proj || !canWriteProgetto(proj)) return;

  const newRiga = Number(riga);
  const oldRiga = draggedTask.riga ?? 0;

  // Sposta in fondo alla riga target
  const rowTasks = S.task
    .filter(t => t.progetto_id === projId && (t.riga ?? 0) === newRiga && t.id !== _drag.taskId)
    .sort((a,b) => a.posizione - b.posizione);

  const newPos = rowTasks.length;
  draggedTask.riga = newRiga;
  draggedTask.posizione = newPos;
  draggedTask.progetto_id = projId;
  rowTasks.push(draggedTask);

  const updates = rowTasks.map((t,i) =>
    db('PATCH', T('task'), {flt:`id=eq.${t.id}`, body:{posizione:i, riga:newRiga, progetto_id:projId}})
  );
  // Render immediato con stato locale già aggiornato
  _drag = null;
  renderBoard($('pb'));
  // Persistenza in background
  Promise.all(updates).then(()=>writeLog('task_move','task',null,{riga:newRiga,posizione:newPos}));
}

async function saveTaskDetail(taskId){
  const t=S.task.find(x=>x.id===taskId);
  if(!t) return;
  const updates={
    nome:     $('td-nome').value.trim(),
    descrizione: $('td-desc').value.trim(),
    stato:    $('td-stato').value,
    priorita: $('td-prio').value,
    is_prioritario: $('td-prioritario').checked,
    data_inizio:   $('td-ini').value||null,
    data_scadenza: $('td-scad').value||null,
    stima_ore:     $('td-stima').value?parseFloat($('td-stima').value):null,
    ore_effettive: $('td-ore').value?parseFloat($('td-ore').value):null,
    assegnato_a:   $('td-assegnato').value||null,
  };
  if(!updates.nome){toast('Nome obbligatorio','err');return;}
  await db('PATCH',T('task'),{flt:`id=eq.${taskId}`,body:updates});
  await writeLog('task_update','task',taskId,{updates});
  Object.assign(t,updates);
  closeM(); renderBoard($('pb')); renderDrawer(); toast('Task salvato','ok');
}

async function addDep(taskId){
  const depId=$('dep-sel').value;
  if(!depId) return;
  // Check cicli semplice: depId non deve dipendere (direttamente) da taskId
  if(S.dipendenze.some(d=>d.task_id===depId&&d.dipende_da_id===taskId)){
    toast('Dipendenza circolare rilevata!','err'); return;
  }
  await db('POST',T('task_dipendenze'),{body:{task_id:taskId,dipende_da_id:depId}});
  S.dipendenze.push({task_id:taskId,dipende_da_id:depId});
  openTaskDetail(taskId); // re-render modal
}

async function removeDep(taskId,depId){
  await db('DELETE',T('task_dipendenze'),{flt:`task_id=eq.${taskId}&dipende_da_id=eq.${depId}`});
  S.dipendenze=S.dipendenze.filter(d=>!(d.task_id===taskId&&d.dipende_da_id===depId));
  openTaskDetail(taskId);
}

async function saveTask(taskId, progettoId, riga){
  const isNew=!taskId;
  const nome=$('tm-nome').value.trim();
  if(!nome){toast('Nome obbligatorio','err');return;}
  const rigaNum = Number(riga ?? 0);
  const body={
    progetto_id:  progettoId,
    nome,
    descrizione:  $('tm-desc').value.trim(),
    stato:        $('tm-stato').value,
    priorita:     $('tm-prio').value,
    data_inizio:  $('tm-ini').value||null,
    data_scadenza:$('tm-scad').value||null,
    stima_ore:    $('tm-stima').value?parseFloat($('tm-stima').value):null,
    ore_effettive:$('tm-ore').value?parseFloat($('tm-ore').value):null,
    assegnato_a:  $('tm-assegnato').value||null,
    riga:         rigaNum,
  };
  if(isNew){
    const rowTasks = S.task.filter(t=>t.progetto_id===progettoId&&(t.riga??0)===rigaNum);
    const maxPos = Math.max(-1,...rowTasks.map(t=>t.posizione));
    body.posizione=maxPos+1;
    const [created]=await db('POST',T('task'),{body});
    S.task.push(created);
    await writeLog('task_create','task',created.id,{nome:created.nome,progetto_id:progettoId});
    toast('Task creato','ok');
  } else {
    await db('PATCH',T('task'),{flt:`id=eq.${taskId}`,body});
    const t=S.task.find(x=>x.id===taskId); if(t) Object.assign(t,body);
    await writeLog('task_update','task',taskId,{updates:body});
    toast('Task aggiornato','ok');
  }
  closeM(); renderBoard($('pb'));
}

async function saveProgetto(progettoId){
  const isNew=!progettoId;
  const nome=$('pm-nome').value.trim();
  if(!nome){toast('Nome obbligatorio','err');return;}
  const body={
    nome,
    descrizione: $('pm-desc').value.trim(),
    categoria_id: $('pm-cat').value||null,
    sottocategoria_id: $('pm-sub').value||null,
    stato: $('pm-stato').value,
    priorita: $('pm-prio').value,
    data_inizio: $('pm-ini').value||null,
    data_scadenza: $('pm-scad').value||null,
    colore: $('pm-colore').value,
  };
  if(isNew){
    body.utente_id=S.user.id;
    const maxPos=Math.max(-1,...S.progetti.map(p=>p.ordine));
    body.ordine=maxPos+1;
    const [created]=await db('POST',T('progetti'),{body});
    S.progetti.push(created);
    await writeLog('progetto_create','progetto',created.id,{nome:created.nome});
    toast('Progetto creato','ok');
  } else {
    await db('PATCH',T('progetti'),{flt:`id=eq.${progettoId}`,body});
    const p=S.progetti.find(x=>x.id===progettoId); if(p) Object.assign(p,body);
    await writeLog('progetto_update','progetto',progettoId,{updates:body});
    toast('Progetto aggiornato','ok');
  }
  closeM(); renderBoard($('pb'));
}

async function deleteProgetto(progettoId){
  const ok=await openConf('Elimina progetto','Eliminare il progetto e tutti i suoi task? Operazione irreversibile.');
  if(!ok) return;
  await db('DELETE',T('progetti'),{flt:`id=eq.${progettoId}`});
  await writeLog('progetto_delete','progetto',progettoId,{});
  S.task=S.task.filter(t=>t.progetto_id!==progettoId);
  S.progetti=S.progetti.filter(p=>p.id!==progettoId);
  closeM(); renderBoard($('pb')); toast('Progetto eliminato','ok');
}

function openPermessiModal(progettoId){
  const proj=S.progetti.find(p=>p.id===progettoId);
  if(!proj||!isOwner(proj)){toast('Non autorizzato','err');return;}
  const perms=S.permessi.filter(p=>p.progetto_id===progettoId);
  // Profili che non hanno già un permesso e non sono il proprietario
  const available=S.profili.filter(p=>
    p.id!==proj.utente_id &&
    !perms.find(x=>x.utente_id===p.id) &&
    p.attivo
  );

  const permItems=perms.map(pe=>{
    const pr=profiloById(pe.utente_id);
    return `<div class="perm-item">
      <div class="perm-name">${esc(pr?.nome||'')} ${esc(pr?.cognome||'')}</div>
      <span class="perm-level ${pe.livello}">${pe.livello==='read'?'👁 Lettura':'✏️ Lettura+Scrittura'}</span>
      <button class="act-btn" onclick="togglePermLevel('${pe.progetto_id}','${pe.utente_id}','${pe.livello}')">Cambia</button>
      <button class="act-btn" style="color:var(--red)" onclick="removePerm('${pe.progetto_id}','${pe.utente_id}')">✕</button>
    </div>`;
  }).join('');

  openM(`
  <div class="modal-head">
    <div class="modal-title">Permessi — ${esc(proj.nome)}</div>
    <button class="modal-close" onclick="closeM()">×</button>
  </div>
  <div style="margin-bottom:16px;">
    ${perms.length?permItems:`<div style="color:var(--g300);font-size:13px;">Nessun permesso condiviso</div>`}
  </div>
  ${available.length?`
  <div style="border-top:1px solid var(--g100);padding-top:16px;margin-top:8px;">
    <div style="font-size:12px;font-weight:700;color:var(--g500);text-transform:uppercase;margin-bottom:10px;">Aggiungi accesso</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <select id="perm-uid" class="filtro-sel" style="flex:1">
        <option value="">— Seleziona utente —</option>
        ${available.map(p=>`<option value="${p.id}">${esc(p.nome+' '+p.cognome)}</option>`).join('')}
      </select>
      <select id="perm-livello" class="filtro-sel">
        <option value="read">👁 Lettura</option>
        <option value="write">✏️ Lettura+Scrittura</option>
      </select>
      <button class="mbtn mbtn-primary" onclick="addPerm('${progettoId}')">+ Aggiungi</button>
    </div>
  </div>`:''}
  <div class="modal-actions">
    <button class="mbtn mbtn-secondary" onclick="closeM()">Chiudi</button>
  </div>`);
}

async function addPerm(progettoId){
  const uid=$('perm-uid').value, liv=$('perm-livello').value;
  if(!uid){toast('Seleziona un utente','err');return;}
  const body={progetto_id:progettoId,utente_id:uid,livello:liv,concesso_da:S.user.id};
  const [created]=await db('POST',T('permessi'),{body});
  S.permessi.push(created);
  await writeLog('permesso_grant','permesso',created.id,{progetto_id:progettoId,utente_id:uid,livello:liv});
  toast('Accesso concesso','ok');
  openPermessiModal(progettoId);
}

async function removePerm(progettoId,userId){
  await db('DELETE',T('permessi'),{flt:`progetto_id=eq.${progettoId}&utente_id=eq.${userId}`});
  S.permessi=S.permessi.filter(p=>!(p.progetto_id===progettoId&&p.utente_id===userId));
  await writeLog('permesso_revoke','permesso',null,{progetto_id:progettoId,utente_id:userId});
  toast('Accesso revocato','ok');
  openPermessiModal(progettoId);
}

async function togglePermLevel(progettoId,userId,current){
  const newLiv=current==='read'?'write':'read';
  await db('PATCH',T('permessi'),{flt:`progetto_id=eq.${progettoId}&utente_id=eq.${userId}`,body:{livello:newLiv}});
  const pe=S.permessi.find(p=>p.progetto_id===progettoId&&p.utente_id===userId);
  if(pe) pe.livello=newLiv;
  await writeLog('permesso_update','permesso',null,{progetto_id:progettoId,utente_id:userId,livello:newLiv});
  toast(`Livello aggiornato → ${newLiv}`,'ok');
  openPermessiModal(progettoId);
}

function initDrawer(){
  S.drawerDate=today();
  $('drawer-date').textContent=fmt(S.drawerDate);

  $('drawer-toggle').addEventListener('click',()=>{
    S.drawerOpen=!S.drawerOpen;
    $('drawer').classList.toggle('open',S.drawerOpen);
    $('drawer-toggle').classList.toggle('open',S.drawerOpen);
    $('main').style.marginRight = S.drawerOpen ? '300px' : '0';
  });

  $('drawer-add-btn').addEventListener('click', addTaskVeloce);
  $('drawer-add-input').addEventListener('keydown',e=>{if(e.key==='Enter') addTaskVeloce();});
  renderDrawer(); // render iniziale con task prioritari già caricati

  // Drop zone nel drawer
  const dz=$('drawer-drop-zone');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop',async e=>{
    e.preventDefault(); dz.classList.remove('drag-over');
    const taskId=e.dataTransfer.getData('taskId');
    if(!taskId) return;
    const t=S.task.find(x=>x.id===taskId);
    if(!t) return;
    const proj=S.progetti.find(p=>p.id===t.progetto_id);
    const body={
      utente_id:S.user.id,
      testo:t.nome,
      progetto_id:t.progetto_id||null,
      task_id:taskId,
      data_riferimento:today(),
      completato:false,
      ordine:S.taskVeloci.length,
    };
    const [created]=await db('POST',T('task_veloci'),{body});
    S.taskVeloci.push(created);
    renderDrawer();
    toast(`Task aggiunto alle note: ${t.nome}`,'ok');
  });

  renderDrawer();
}

function renderDrawer(){
  const list=$('drawer-list'); if(!list) return;

  // Task veloci del giorno
  const tvHtml = S.taskVeloci.map(tv=>{
    const projNome=tv.progetto_id?(S.progetti.find(p=>p.id===tv.progetto_id)?.nome||''):'';
    const linkedTask = tv.task_id ? S.task.find(t=>t.id===tv.task_id) : null;
    return `<div class="tv-item${tv.completato?' done':''}" id="tv-${tv.id}">
      <div class="tv-check${tv.completato?' checked':''}" onclick="toggleTaskVeloce('${tv.id}')">
        ${tv.completato?'✓':''}
      </div>
      <div class="tv-text" ${linkedTask?`onclick="openTaskDetail('${linkedTask.id}')" style="cursor:pointer;" title="Apri task nel board"`:''}>${esc(tv.testo)}</div>
      ${projNome?`<div class="tv-link" title="${esc(projNome)}">📋 ${esc(projNome)}</div>`:''}
      <span class="tv-del" onclick="deleteTaskVeloce('${tv.id}')">✕</span>
    </div>`;
  }).join('');

  // Task prioritari dal board (non già presenti come task veloci con link)
  const tvLinkedIds = new Set(S.taskVeloci.filter(tv=>tv.task_id).map(tv=>tv.task_id));
  const prioritari = S.task.filter(t=>!!t.is_prioritario && !tvLinkedIds.has(t.id) && t.stato!=='completato' && t.stato!=='annullato');
  const prioHtml = prioritari.length ? `
    <div style="padding:8px 16px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--orange);">⚡ Prioritari</div>
    ${prioritari.map(t=>{
      const proj=S.progetti.find(p=>p.id===t.progetto_id);
      return `<div class="tv-item prioritario" onclick="openTaskDetail('${t.id}')" style="cursor:pointer;" title="Apri nel board">
        <div class="tv-check" onclick="event.stopPropagation();quickCompleteTask('${t.id}')">·</div>
        <div class="tv-text">${esc(t.nome)}</div>
        ${proj?`<div class="tv-link" title="${esc(proj.nome)}">📋 ${esc(proj.nome)}</div>`:''}
      </div>`;
    }).join('')}` : '';

  const isEmpty = !S.taskVeloci.length && !prioritari.length;
  list.innerHTML = isEmpty
    ? `<div style="padding:20px;text-align:center;font-size:12px;color:var(--g300);">Nessun task per oggi</div>`
    : tvHtml + prioHtml;
  // Badge sul toggle: mostra contatore prioritari non completati
  const toggle=$('drawer-toggle');
  if(toggle) toggle.innerHTML = 'NOTE';
}

async function quickCompleteTask(taskId){
  const t=S.task.find(x=>x.id===taskId); if(!t) return;
  t.stato='completato';
  renderDrawer(); renderBoard($('pb'));
  db('PATCH',T('task'),{flt:`id=eq.${taskId}`,body:{stato:'completato'}});
}

async function addTaskVeloce(){
  const inp=$('drawer-add-input');
  const testo=inp.value.trim();
  if(!testo) return;
  const body={
    utente_id:S.user.id,testo,completato:false,
    data_riferimento:today(),ordine:S.taskVeloci.length,
  };
  const [created]=await db('POST',T('task_veloci'),{body});
  S.taskVeloci.push(created); inp.value=''; renderDrawer();
}

async function toggleTaskVeloce(id){
  const tv=S.taskVeloci.find(x=>x.id===id); if(!tv) return;
  tv.completato=!tv.completato;
  await db('PATCH',T('task_veloci'),{flt:`id=eq.${id}`,body:{completato:tv.completato}});
  renderDrawer();
}

async function deleteTaskVeloce(id){
  await db('DELETE',T('task_veloci'),{flt:`id=eq.${id}`});
  S.taskVeloci=S.taskVeloci.filter(x=>x.id!==id); renderDrawer();
}

async function deleteCatConfirm(catId){
  const cat=S.categorie.find(c=>c.id===catId);
  const nProj=S.progetti.filter(p=>p.categoria_id===catId).length;
  const msg=nProj>0
    ? `Eliminare la categoria "${cat?.nome}"? I ${nProj} progetti associati perderanno il collegamento alla categoria.`
    : `Eliminare la categoria "${cat?.nome}"?`;
  const ok=await openConf('Elimina categoria',msg);
  if(!ok) return;
  await db('DELETE',T('categorie'),{flt:`id=eq.${catId}`});
  S.sottocategorie=S.sottocategorie.filter(s=>s.categoria_id!==catId);
  S.progetti.forEach(p=>{if(p.categoria_id===catId){p.categoria_id=null;p.sottocategoria_id=null;}});
  S.categorie=S.categorie.filter(c=>c.id!==catId);
  await writeLog('categoria_delete','categoria',catId,{nome:cat?.nome});
  renderCategoriePage($('pb')); toast('Categoria eliminata','ok');
}

async function deleteSubcatConfirm(subId){
  const sub=S.sottocategorie.find(s=>s.id===subId);
  const nProj=S.progetti.filter(p=>p.sottocategoria_id===subId).length;
  const msg=nProj>0
    ? `Eliminare la sottocategoria "${sub?.nome}"? I ${nProj} progetti associati perderanno il collegamento.`
    : `Eliminare la sottocategoria "${sub?.nome}"?`;
  const ok=await openConf('Elimina sottocategoria',msg);
  if(!ok) return;
  await db('DELETE',T('sottocategorie'),{flt:`id=eq.${subId}`});
  S.progetti.forEach(p=>{if(p.sottocategoria_id===subId) p.sottocategoria_id=null;});
  S.sottocategorie=S.sottocategorie.filter(s=>s.id!==subId);
  await writeLog('sottocategoria_delete','sottocategoria',subId,{nome:sub?.nome});
  renderCategoriePage($('pb')); toast('Sottocategoria eliminata','ok');
}

function openUtenteModal(userId){
  const isNew=!userId;
  const u=userId?S.profili.find(p=>p.id===userId):null;
  const ruoliOpts=['admin','utente'];
  const attivoChecked=u?u.attivo:true;

  openM(`
  <div class="modal-head">
    <div class="modal-title">${isNew?'Nuovo Utente':'Modifica Utente'}</div>
    <button class="modal-close" onclick="closeM()">×</button>
  </div>
  <div class="mfield-row">
    <div class="mfield"><label>Nome *</label><input id="um-nome" value="${u?esc(u.nome):''}"/></div>
    <div class="mfield"><label>Cognome *</label><input id="um-cognome" value="${u?esc(u.cognome):''}"/></div>
  </div>
  <div class="mfield">
    <label>E-Mail *</label>
    <input type="email" id="um-email" value="${u?esc(u.email):''}" ${!isNew?'disabled':''}/>
    ${isNew?`<div id="um-email-info" style="display:none"></div>`:''}
  </div>
  <div class="mfield" id="um-pwd-wrap" ${!isNew?'style="display:none"':''}>
    <label>${isNew?'Password *':'Nuova password'}</label>
    <input type="password" id="um-pwd" placeholder="••••••••" ${!isNew?'':''}/>
    ${!isNew?`<div class="mfield-hint" style="color:var(--orange)">⚠️ La nuova password sarà valida per tutti i tool Medical Group</div>`:''}
  </div>
  <div class="mfield"><label>Ruolo</label>
    <select id="um-ruolo">${ruoliOpts.map(r=>`<option value="${r}"${(u?.ruolo||'utente')===r?' selected':''}>${r}</option>`).join('')}</select>
  </div>
  <div class="mfield">
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;font-weight:500">
      <span style="position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0;">
        <input type="checkbox" id="um-attivo" ${attivoChecked?'checked':''} style="opacity:0;width:0;height:0;position:absolute"/>
        <span id="um-attivo-track" style="position:absolute;inset:0;border-radius:11px;background:${attivoChecked?'var(--verde)':'var(--g300)'};transition:background .2s;cursor:pointer"></span>
        <span id="um-attivo-knob" style="position:absolute;top:3px;left:${attivoChecked?21:3}px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s"></span>
      </span>
      Utente attivo
    </label>
  </div>
  <div class="modal-actions">
    ${!isNew?`<button class="mbtn mbtn-danger" onclick="deleteUtenteProfile('${userId}')">🗑️ Rimuovi dal tool</button>`:''}
    <button class="mbtn mbtn-secondary" onclick="closeM()">Annulla</button>
    <button class="mbtn mbtn-primary" onclick="saveUtente('${userId||''}')">💾 Salva</button>
  </div>`);

  // toggle attivo
  const cb=$('um-attivo'),track=$('um-attivo-track'),knob=$('um-attivo-knob');
  cb.addEventListener('change',()=>{
    track.style.background=cb.checked?'var(--verde)':'var(--g300)';
    knob.style.left=cb.checked?'21px':'3px';
  });

  // check email live (solo nuovo utente)
  if(isNew){
    const emailEl=$('um-email'),infoEl=$('um-email-info'),pwdWrap=$('um-pwd-wrap');
    let debTimer=null;
    const doCheck=()=>checkEmailLive(emailEl,infoEl,pwdWrap,'progetti-manage-user');
    emailEl.addEventListener('blur',doCheck);
    emailEl.addEventListener('input',()=>{
      clearTimeout(debTimer);
      if(infoEl){infoEl.style.display='none';infoEl.dataset.exists='';}
      if(emailEl.value.includes('@')&&emailEl.value.includes('.'))
        debTimer=setTimeout(doCheck,600);
    });
  }
  // mostra campo password in modifica
  if(!isNew){
    $('um-pwd-wrap').style.display='';
    $('um-pwd').disabled=false;
  }
}

async function checkEmailLive(inputEl,infoEl,pwdWrap,fnName){
  const email=inputEl.value.trim();
  if(infoEl){infoEl.style.display='none';infoEl.dataset.exists='';}
  if(!email||!email.includes('@')||!email.includes('.')) return;
  if(!infoEl) return;
  infoEl.style.cssText='display:block;margin-top:6px;padding:6px 10px;border-radius:var(--rsm);font-size:12px;';
  infoEl.textContent='Verifica in corso…';
  try{
    const res=await fetch(`${CFG.FN}/${fnName}`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${S.token}`,'Content-Type':'application/json'},
      body:JSON.stringify({action:'check_email',email}),
    });
    const data=await res.json();
    if(!data.ok){infoEl.textContent='Errore verifica: '+(data.error||'risposta non valida');infoEl.style.background='var(--red-light)';infoEl.style.color='var(--red)';return;}
    infoEl.dataset.exists=data.exists?'true':'false';
    if(data.exists){
      infoEl.textContent='✓ Utente già presente — la password rimane la stessa impostata per gli altri tool';
      infoEl.style.background='var(--green-light)';infoEl.style.color='var(--verde)';
      if(pwdWrap){pwdWrap.style.display='none';const p=pwdWrap.querySelector('input[type=password]');if(p){p.value='';p.disabled=true;}}
    } else {
      infoEl.textContent='Nuovo utente — inserisci una password per creare l\'account';
      infoEl.style.background='var(--blue-xlight)';infoEl.style.color='var(--navy)';
      if(pwdWrap){pwdWrap.style.display='';const p=pwdWrap.querySelector('input[type=password]');if(p) p.disabled=false;}
    }
  }catch(e){infoEl.textContent='Errore di rete: '+e.message;infoEl.style.background='var(--red-light)';infoEl.style.color='var(--red)';}
}

async function saveUtente(userId){
  const isNew=!userId;
  const nome=$('um-nome').value.trim(),cognome=$('um-cognome').value.trim();
  const email=isNew?$('um-email').value.trim():'';
  const pwd=$('um-pwd').value;
  const ruolo=$('um-ruolo').value;
  const attivo=$('um-attivo').checked;
  if(!nome||!cognome){toast('Nome e cognome obbligatori','err');return;}
  if(isNew&&!email){toast('Email obbligatoria','err');return;}
  const infoEl=$('um-email-info');
  const emailExists=infoEl&&infoEl.dataset.exists==='true';
  if(isNew&&!emailExists&&(!pwd||pwd.length<6)){toast('Password obbligatoria (min 6 caratteri)','err');return;}

  const action=isNew?'create':'update';
  const body={action,nome,cognome,ruolo,attivo};
  if(isNew){body.email=email;if(!emailExists) body.password=pwd;}
  else{body.user_id=userId;if(pwd&&pwd.length>=6) body.password=pwd;}

  const res=await fn('progetti-manage-user',body);
  if(!res.ok){toast('Errore: '+(res.error||'sconosciuto'),'err');return;}

  if(isNew){
    const [newP]=await db('GET',T('profili'),{flt:`id=eq.${res.user_id}`});
    if(newP) S.profili.push(newP);
  } else {
    const p=S.profili.find(x=>x.id===userId);
    if(p) Object.assign(p,{nome,cognome,ruolo,attivo});
  }
  closeM(); renderUtenti($('pb')); toast(isNew?'Utente creato':'Utente aggiornato','ok');
}

async function deleteUtenteProfile(userId){
  if(userId===S.user.id){toast('Non puoi rimuovere te stesso','err');return;}
  const ok=await openConf('Rimuovi utente','Rimuovere l\'utente dal tool Progetti? L\'account rimane attivo sugli altri tool.');
  if(!ok) return;
  const res=await fn('progetti-manage-user',{action:'delete_profile',user_id:userId});
  if(!res.ok){toast('Errore: '+(res.error||'sconosciuto'),'err');return;}
  S.profili=S.profili.filter(p=>p.id!==userId);
  closeM(); renderUtenti($('pb')); toast('Utente rimosso dal tool','ok');
}

const logFiltri = { da: '', a: '', testo: '' };

async function renderLogPage(pb){
  if(S.user.ruolo!=='admin'){
    pb.innerHTML='<div class="empty-state"><div class="es-icon">🔒</div><p>Accesso riservato agli amministratori</p></div>';
    return;
  }
  // Imposta default date se ancora vuote
  if(!logFiltri.da) logFiltri.da = today();
  if(!logFiltri.a)  logFiltri.a  = today();

  pb.innerHTML=`
  <div class="pg-head">
    <div><div class="pg-title">Log modifiche</div></div>
  </div>
  <div id="filtri-bar" style="margin-bottom:20px;">
    <div class="filtro-group">
      <label>Dal</label>
      <input type="date" class="filtro-input" id="lf-da" value="${logFiltri.da}" style="width:150px;"/>
    </div>
    <div class="filtro-group">
      <label>Al</label>
      <input type="date" class="filtro-input" id="lf-a" value="${logFiltri.a}" style="width:150px;"/>
    </div>
    <div class="filtro-group">
      <label>Cerca</label>
      <input class="filtro-input" id="lf-testo" placeholder="utente, azione, dettaglio…" value="${esc(logFiltri.testo)}" style="width:220px;"/>
    </div>
    <button class="mbtn mbtn-primary" onclick="applyLogFiltri()" style="padding:7px 18px;">Filtra</button>
    <button id="filtri-reset" onclick="resetLogFiltri()">✕ Reset</button>
  </div>
  <div id="log-wrap">
    <div style="padding:20px;text-align:center;">
      <span class="spn" style="border-color:var(--g200);border-top-color:var(--verde);width:20px;height:20px;display:inline-block;"></span>
    </div>
  </div>`;

  // Enter su campo testo
  $('lf-testo').addEventListener('keydown', e=>{ if(e.key==='Enter') applyLogFiltri(); });

  await loadLog(logFiltri.da, logFiltri.a, logFiltri.testo);
  renderLogTable();
}

function renderLogTable(){
  const wrap=$('log-wrap'); if(!wrap) return;
  if(!S.log||!S.log.length){
    wrap.innerHTML='<div class="empty-state" style="padding:40px 0;"><p style="color:var(--g300)">Nessun log per il periodo selezionato</p></div>';
    return;
  }
  wrap.innerHTML=`
  <div style="margin-bottom:8px;font-size:12px;color:var(--g500);">${S.log.length} registrazion${S.log.length===1?'e':'i'}</div>
  <div style="background:#fff;border-radius:var(--r);border:1px solid var(--g200);box-shadow:var(--sh-sm);overflow:hidden;">
  <table class="log-table">
    <thead><tr>
      <th>Data e ora</th><th>Utente</th><th>Azione</th><th>Entità</th><th>Dettaglio</th>
    </tr></thead>
    <tbody>
    ${S.log.map(l=>{
      const dt = new Date(l.created_at);
      const dataOra = dt.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'})
                    + ' ' + dt.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      return `<tr>
        <td style="white-space:nowrap;color:var(--g500);font-size:11.5px;">${dataOra}</td>
        <td style="font-weight:600;">${l.utente_id?esc(profiloNome(l.utente_id)):'—'}</td>
        <td><code style="font-size:11px;background:var(--g100);padding:2px 6px;border-radius:4px">${esc(l.azione)}</code></td>
        <td style="color:var(--g500)">${esc(l.entita)}</td>
        <td><div class="log-json" onclick="this.classList.toggle('expanded')">${esc(JSON.stringify(l.dettaglio,null,2))}</div></td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>
  </div>`;
}

async function applyLogFiltri(){
  const da=$('lf-da')?.value, a=$('lf-a')?.value, testo=$('lf-testo')?.value||'';
  if(!da||!a){toast('Seleziona un intervallo di date','err');return;}
  if(da>a){toast('La data iniziale deve essere precedente alla finale','err');return;}
  logFiltri.da=da; logFiltri.a=a; logFiltri.testo=testo;
  const wrap=$('log-wrap');
  wrap.innerHTML='<div style="padding:20px;text-align:center;"><span class="spn" style="border-color:var(--g200);border-top-color:var(--verde);width:20px;height:20px;display:inline-block;"></span></div>';
  await loadLog(da, a, testo);
  renderLogTable();
}

function resetLogFiltri(){
  logFiltri.da=today(); logFiltri.a=today(); logFiltri.testo='';
  renderLogPage($('pb'));
}

// ============================================================
document.addEventListener('DOMContentLoaded', async()=>{
  const tl=$('tb-logo'); if(tl) tl.innerHTML=logoHTML(true);
  const ll=$('login-logo'); if(ll) ll.innerHTML=logoHTML(false);

  // Build version da GitHub
  const lv=$('login-ver'),tv=$('tb-ver');
  try{
    const res=await fetch('https://api.github.com/repos/ictmedicalgroup-sudo/progetti/commits?per_page=1');
    if(res.ok){
      const[c]=await res.json();
      const d=new Date(c.commit.committer.date);
      const s='build '+d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
      if(lv) lv.textContent=s; if(tv) tv.textContent=s;
    }
  }catch(e){}

  // Enter su login
  $('lpw').addEventListener('keydown',e=>{if(e.key==='Enter') doLogin();});
  $('lem').addEventListener('keydown',e=>{if(e.key==='Enter') $('lpw').focus();});
  $('lbtn').addEventListener('click', doLogin);
  $('lout').addEventListener('click', doLogout);

  // Modal overlay click
  $('modal-overlay').addEventListener('click',e=>{if(e.target===$('modal-overlay')) closeM();});

  // Context menu items
  $('ctx-menu').querySelectorAll('.ctx-item[data-stato]').forEach(item=>{
    item.addEventListener('click',async e=>{
      e.stopPropagation();
      $('ctx-menu').classList.remove('show');
      if(!S.ctxTask) return;
      const oldStato=S.ctxTask.stato, newStato=item.dataset.stato;
      S.ctxTask.stato=newStato;
      renderBoard($('pb'));
      toast(`Stato → ${newStato}`,'ok');
      db('PATCH',T('task'),{flt:`id=eq.${S.ctxTask.id}`,body:{stato:newStato}})
        .then(()=>writeLog('task_stato','task',S.ctxTask.id,{da:oldStato,a:newStato}));
    });
  });
  $('ctx-prio').addEventListener('click',async e=>{
    e.stopPropagation();
    $('ctx-menu').classList.remove('show');
    if(!S.ctxTask) return;
    const newVal = !S.ctxTask.is_prioritario;
    S.ctxTask.is_prioritario = newVal;
    renderBoard($('pb')); renderDrawer();
    db('PATCH',T('task'),{flt:`id=eq.${S.ctxTask.id}`,body:{is_prioritario:newVal}})
      .then(()=>writeLog('task_priorita','task',S.ctxTask.id,{is_prioritario:newVal}));
  });
  $('ctx-delete').addEventListener('click',async e=>{
    e.stopPropagation();
    if(!S.ctxTask) return;
    const ok=await openConf('Elimina task',`Eliminare "${S.ctxTask.nome}"?`);
    if(!ok) return;
    await db('DELETE',T('task'),{flt:`id=eq.${S.ctxTask.id}`});
    await writeLog('task_delete','task',S.ctxTask.id,{nome:S.ctxTask.nome});
    S.task=S.task.filter(t=>t.id!==S.ctxTask.id);
    S.ctxTask=null; renderBoard($('pb')); toast('Task eliminato','ok');
  });
});
</script>
</body>
</html>
